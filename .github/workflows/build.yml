name: Build iOS Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Install Theos
      run: |
        brew install theos
    
    - name: Build
      run: |
        cd $THEOS
        make clean
        make package
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: EnhancedAdSkip
        path: packages/*.deb