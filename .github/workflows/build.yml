name: Build iOS Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Install Theos
      run: brew install theos
    - name: Build
      run: |
        cd $THEOS
        make clean
        make package
    - uses: actions/upload-artifact@v4
      with:
        name: EnhancedAdSkip
        path: packages/*.deb
